<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14142A"/>
      <stop offset="100%" stop-color="#0C0C14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#E8C873"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="508" height="508" x="2" y="2" rx="106" fill="none" stroke="rgba(212,168,67,0.15)" stroke-width="2"/>
  <!-- Gold glow behind symbol -->
  <circle cx="256" cy="240" r="80" fill="rgba(212,168,67,0.08)" filter="url(#glow)"/>
  <!-- Cedi symbol ₵ -->
  <text x="256" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="220" fill="url(#gold)" letter-spacing="-5">₵</text>
  <!-- App name -->
  <text x="256" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="48" fill="rgba(232,232,240,0.6)" letter-spacing="4">CEDISENSE</text>
</svg>
