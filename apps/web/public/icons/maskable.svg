<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14142A"/>
      <stop offset="100%" stop-color="#0C0C14"/>
    </linearGradient>
    <linearGradient id="mgold" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#E8C873"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background (maskable icons get cropped to various shapes) -->
