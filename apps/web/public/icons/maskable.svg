  <!-- Cedi symbol centered in safe zone (inner 80%) -->
  <text x="256" y="295" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="240" fill="url(#mgold)" letter-spacing="-5">₵</text>
</svg>
